<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1"/>
<title>Embody Wealth Portal — Aurailia</title>
<script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,600;1,400;1,600&display=swap" rel="stylesheet"/>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{background:#FDFCF8;font-family:Georgia,serif;min-height:100vh}
::-webkit-scrollbar{width:3px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:rgba(255,31,122,0.3);border-radius:2px}
@keyframes sp{0%,100%{opacity:0;transform:scale(0.5) rotate(0deg)}50%{opacity:1;transform:scale(1) rotate(15deg)}}
@keyframes fadeUp{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}
@keyframes pulse{0%,100%{opacity:0.3;transform:scale(0.8)}50%{opacity:1;transform:scale(1.2)}}
@keyframes slowPulse{0%,100%{opacity:0.5;transform:scale(0.95)}50%{opacity:1;transform:scale(1.05)}}
button{cursor:pointer;transition:opacity 0.2s}
button:hover{opacity:0.88}
textarea:focus{outline:none}
@media(min-width:900px){.two-col{display:grid !important;grid-template-columns:1fr 1fr;gap:32px}.two-col-3{display:grid !important;grid-template-columns:1fr 1fr 1fr;gap:20px}}
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const IMGS = {
  hd_bodygraph: "images/1.png",
  bg1: "images/background-1.png",
  bg2: "images/background-2.png",
  bg3: "images/background-3.png",
  sparkle1: "images/2.png",
  sparkle2: "images/3.png",
  sparkle3: "images/4.png",
  tree: "images/1.jpg",
};

const ORACLE_IMGS = ["images/oracle-1.jpg", "images/oracle-2.jpg", "images/oracle-3.jpg"];

const FaceDownCard = ({onClick, imgSrc}) => {
  const [hov,setHov]=useState(false);
  return (
    <div onClick={onClick} onMouseEnter={()=>setHov(true)} onMouseLeave={()=>setHov(false)}
      style={{width:"100%",aspectRatio:"2/3.2",borderRadius:"16px",cursor:"pointer",position:"relative",overflow:"hidden",
        boxShadow:hov?"0 16px 40px rgba(100,120,180,0.35)":"0 6px 28px rgba(100,120,180,0.15)",
        transform:hov?"translateY(-6px) scale(1.02)":"translateY(0) scale(1)",transition:"all 0.3s"}}>
      <img src={imgSrc} alt="Oracle Card" style={{width:"100%",height:"100%",objectFit:"cover",display:"block"}}/>
      <div style={{position:"absolute",bottom:0,left:0,right:0,padding:"16px 12px 14px",
        background:"linear-gradient(to top, rgba(30,40,80,0.75) 0%, transparent 100%)",
        display:"flex",alignItems:"flex-end",justifyContent:"center"}}>
        <span style={{fontSize:"10px",letterSpacing:"0.22em",textTransform:"uppercase",color:"rgba(255,255,255,0.9)",
          fontFamily:"Georgia,serif",fontWeight:"600",textShadow:"0 1px 4px rgba(0,0,0,0.4)"}}>Tap to Reveal</span>
      </div>
    </div>
  );
};

// ── BREATHING CIRCLE ─────────────────────────────────────────────
const BreathingCircle = ({onComplete}) => {
  const [phase,setPhase]=useState("ready");
  const [breath,setBreath]=useState(0);
  const [showQ,setShowQ]=useState(false);
  const dur={inhale:4000,exhale:6000};
  const runCycle=(count)=>{setBreath(count+1);setPhase("inhale");setTimeout(()=>{setPhase("exhale");setTimeout(()=>{if(count+1>=3){setPhase("done");setShowQ(true);}else runCycle(count+1);},dur.exhale);},dur.inhale);};
  const labels={ready:"Tap to begin",inhale:"Breathe in...",exhale:"Breathe out...",done:"Beautiful."};
  const expanded=phase==="inhale";
  const sz=expanded?180:phase==="ready"?110:90;
  return (
    <div style={{textAlign:"center",padding:"20px 0"}}>
      {phase!=="ready"&&phase!=="done"&&<div style={{fontSize:"14px",letterSpacing:"0.2em",textTransform:"uppercase",color:"#FF1F7A",fontFamily:"Georgia,serif",marginBottom:"20px",opacity:0.8}}>Breath {breath} of 3</div>}
      {phase==="ready"&&<div style={{fontSize:"17px",color:"#555",fontFamily:"Georgia,serif",fontStyle:"italic",marginBottom:"20px"}}>Three breaths before you choose</div>}
      <div onClick={phase==="ready"?()=>runCycle(0):undefined} style={{width:sz+"px",height:sz+"px",borderRadius:"50%",background:expanded?"radial-gradient(circle,rgba(255,31,122,0.1) 0%,rgba(255,31,122,0.03) 60%,transparent 100%)":"radial-gradient(circle,rgba(255,31,122,0.05) 0%,transparent 70%)",border:"1.5px solid rgba(255,31,122,"+(phase==="ready"?0.3:0.7)+")",margin:"0 auto 8px",display:"flex",alignItems:"center",justifyContent:"center",cursor:phase==="ready"?"pointer":"default",transition:"all "+(expanded?dur.inhale:phase==="exhale"?dur.exhale:300)+"ms ease-in-out",boxShadow:expanded?"0 0 40px rgba(255,31,122,0.1)":"none"}}>
        <div style={{width:(sz*0.6)+"px",height:(sz*0.6)+"px",borderRadius:"50%",border:"1px solid rgba(255,31,122,"+((phase==="ready"?0.3:0.7)*0.5)+")",display:"flex",alignItems:"center",justifyContent:"center",transition:"all "+(expanded?dur.inhale:phase==="exhale"?dur.exhale:300)+"ms ease-in-out"}}>
          <div style={{width:"8px",height:"8px",borderRadius:"50%",background:"#FF1F7A",opacity:phase==="ready"?0.3:0.8,transition:"opacity 0.5s"}}/>
        </div>
      </div>
      <div style={{display:"flex",gap:"8px",justifyContent:"center",margin:"16px 0 24px"}}>{[1,2,3].map(i=><div key={i} style={{width:"6px",height:"6px",borderRadius:"50%",background:breath>=i?"#FF1F7A":"transparent",border:"1px solid rgba(255,31,122,0.4)",transition:"background 0.4s"}}/>)}</div>
      <p style={{fontFamily:"'Playfair Display',Georgia,serif",fontSize:"18px",color:phase==="done"?"#FF1F7A":"#3a3a3a",fontStyle:"italic",margin:"0 0 24px",transition:"color 0.5s"}}>{labels[phase]||""}</p>
      {showQ&&(<div style={{animation:"fadeUp 0.6s ease"}}><p style={{fontFamily:"Georgia,serif",fontSize:"17px",color:"#555",fontStyle:"italic",marginBottom:"24px",lineHeight:1.7}}>Get still. Ask your highest self what she wants you to know.<br/>Then choose the card that calls to you.</p><button onClick={()=>onComplete()} style={{width:"100%",background:"linear-gradient(135deg,#FF1F7A,#FF6BAB)",border:"none",borderRadius:"14px",padding:"18px",color:"#fff",fontSize:"17px",fontFamily:"'Playfair Display',Georgia,serif",letterSpacing:"0.08em",boxShadow:"0 4px 20px rgba(255,31,122,0.25)"}}>Choose My Card ✦</button></div>)}
    </div>
  );
};

// ── TRANSIT TAB ──────────────────────────────────────────────────
const TransitTab = ({hdType,openCenters}) => {
  const c=WEEKLY_CONTENT, g=WEEKLY_GATE;
  const typeSection=hdType?c.typeContent[hdType]:null;
  const centerSections=openCenters.filter(ct=>c.centerContent[ct]);
  const hdText=[typeSection,centerSections.length>0?"How this shadow affects your open centers:\n\n"+centerSections.map(ct=>c.centerContent[ct]).join("\n\n"):null].filter(Boolean).join("\n\n");

  const card={background:"#fff",border:"1px solid #f0e8d4",borderRadius:"14px",padding:"22px"};
  const grid={display:"grid",gridTemplateColumns:"1fr 1fr",gap:"20px",marginBottom:"20px"};

  const Block = ({eyebrow,eyebrowColor="#FF1F7A",title,sub,icon,children}) => (
    <div style={{marginBottom:"0"}}>
      <div style={{display:"flex",alignItems:"flex-start",gap:"12px",marginBottom:"10px"}}>
        <div style={{flexShrink:0,marginTop:"4px"}}>{icon}</div>
        <div>
          <div style={{fontSize:"13px",letterSpacing:"0.2em",textTransform:"uppercase",color:eyebrowColor,fontFamily:"Georgia,serif",marginBottom:"4px"}}>{eyebrow}</div>
          <h3 style={{fontFamily:"'Playfair Display',Georgia,serif",fontSize:"22px",color:"#1A1A2E",margin:"0 0 2px",fontWeight:"600",lineHeight:1.15}}>{title}</h3>
          {sub&&<div style={{fontSize:"14px",color:"#89CFF0",fontFamily:"Georgia,serif",fontStyle:"italic",marginTop:"2px"}}>{sub}</div>}
        </div>
      </div>
      <div style={{width:"40px",height:"2px",background:"linear-gradient(to right,"+eyebrowColor+",transparent)",marginBottom:"12px"}}/>
      <div style={{fontSize:"15px",color:"#3a3a3a",lineHeight:1.85,fontFamily:"Georgia,serif",whiteSpace:"pre-line"}}>{children}</div>
    </div>
  );

  const Div = () => (<div style={{display:"flex",alignItems:"center",gap:"14px",margin:"16px 0"}}><div style={{flex:1,height:"1px",background:"linear-gradient(to right,transparent,rgba(255,31,122,0.3))"}}/><span style={{color:"#FF1F7A",fontSize:"11px"}}>✦</span><div style={{flex:1,height:"1px",background:"linear-gradient(to left,transparent,rgba(255,31,122,0.3))"}}/>  </div>);

  return (
    <div>
      <div style={{textAlign:"center",padding:"32px 24px 24px",borderBottom:"1px solid #f0e8d4",position:"relative",overflow:"hidden",backgroundImage:"url(images/background-1.png)",backgroundSize:"cover",backgroundPosition:"center top"}}>
        <div style={{position:"absolute",inset:0,background:"rgba(255,255,255,0.52)"}}/>
        <div style={{position:"relative",zIndex:1}}>
          <div style={{display:"flex",justifyContent:"center",marginBottom:"10px"}}>
            <img src={IMGS.hd_bodygraph} alt="Human Design" style={{width:"100px",height:"auto",opacity:0.92,display:"block",margin:"0 auto",filter:"drop-shadow(0 2px 10px rgba(100,120,200,0.2))"}}/>
          </div>
          <div style={{fontSize:"13px",letterSpacing:"0.25em",color:"#FF1F7A",textTransform:"uppercase",marginBottom:"6px",fontFamily:"Georgia,serif"}}>Sun Transit · {g.dates}</div>
          <h2 style={{fontFamily:"'Playfair Display',Georgia,serif",fontSize:"40px",color:"#1A1A2E",margin:"0 0 4px",fontWeight:"600"}}>Gate {g.number}</h2>
          <div style={{fontSize:"26px",color:"#333",fontFamily:"'Playfair Display',Georgia,serif",fontWeight:"600",marginBottom:"12px"}}>{g.name}</div>
          {hdType&&<span style={{background:"rgba(137,207,240,0.1)",border:"1px solid rgba(137,207,240,0.25)",borderRadius:"20px",padding:"5px 16px",fontSize:"13px",color:"#89CFF0",fontFamily:"Georgia,serif",fontWeight:"600"}}>✦ {hdType}{openCenters.length>0?" · "+openCenters.length+" Open "+(openCenters.length===1?"Center":"Centers"):""}</span>}
        </div>
      </div>

      <div style={{padding:"24px 20px"}}>
        <div style={grid}>
          <div style={card}><Block eyebrow="Boss Energy Download" title="You Already Know." icon={<div style={{fontSize:"20px"}}>☀️</div>}>{c.boss}</Block></div>
          <div style={card}><Block eyebrow="Highest Self Expression" eyebrowColor="#E8A0BF" title="Stepping Into Your Power" sub="The gift of this gate" icon={<div style={{fontSize:"18px"}}>✨</div>}>{c.high}</Block></div>
        </div>
        <Div/>
        <div style={grid}>
          <div style={card}><Block eyebrow="Where You Might Get Stuck" eyebrowColor="#89CFF0" title="The Shadow of This Gate" icon={<Feather size={20} color="#89CFF0"/>}>{c.shadow}</Block></div>
          {hdText?(
            <div style={card}><Block eyebrow="Your Human Design This Week" eyebrowColor="#89CFF0" title="How This Gate Affects Your Design" icon={<Lotus size={20} color="#89CFF0"/>}>{hdText}</Block></div>
          ):(
            <div style={{...card,display:"flex",alignItems:"center",justifyContent:"center",minHeight:"160px"}}>
              <div style={{textAlign:"center"}}>
                <Lotus size={32} color="#89CFF0"/>
                <p style={{fontFamily:"Georgia,serif",fontSize:"13px",color:"#aaa",fontStyle:"italic",marginTop:"10px",lineHeight:1.6}}>Set up your Human Design to see how this gate affects you personally.</p>
              </div>
            </div>
          )}
        </div>
        <Div/>
        <div style={{...card,marginBottom:"0"}}>
          <Block eyebrow="How This Aligns With Your Business" title="Your Magnetic Shift This Week" icon={<Feather size={20} color="#FF1F7A" style={{transform:"scaleX(-1)"}}/>}>{c.business}</Block>
        </div>
        <Div/>
        <div style={grid}>
          <div style={card}><Block eyebrow="Your Move This Week" title="One Thing. Today." icon={<div style={{fontSize:"18px"}}>🔥</div>}>{c.move}</Block></div>
          <div style={card}>
            <div style={{display:"flex",alignItems:"center",gap:"10px",marginBottom:"10px"}}>
              <span style={{fontSize:"16px"}}>✦</span>
              <div>
                <div style={{fontSize:"13px",letterSpacing:"0.2em",textTransform:"uppercase",color:"#89CFF0",fontFamily:"Georgia,serif",marginBottom:"3px"}}>Reflection for Today</div>
                <h3 style={{fontFamily:"'Playfair Display',Georgia,serif",fontSize:"21px",color:"#1A1A2E",margin:0,fontWeight:"600"}}>Questions for This Week</h3>
              </div>
            </div>
            <div style={{width:"36px",height:"2px",background:"linear-gradient(to right,rgba(137,207,240,0.5),transparent)",marginBottom:"12px"}}/>
            {c.reflections.map((q,i)=>(
              <div key={i} style={{display:"flex",gap:"10px",alignItems:"flex-start",marginBottom:"14px"}}>
                <span style={{color:"#FF1F7A",fontSize:"14px",marginTop:"2px",flexShrink:0}}>✨</span>
                <p style={{margin:0,fontSize:"15px",color:"#444",fontFamily:"Georgia,serif",fontStyle:"italic",lineHeight:1.75}}>{q}</p>
              </div>
            ))}
          </div>
        </div>
        <Div/>
        <div style={{...card,textAlign:"center",padding:"28px"}}>
          <div style={{display:"flex",justifyContent:"center",gap:"14px",marginBottom:"12px"}}>
            <Feather size={20} color="#89CFF0"/><Lotus size={32} color="#FF1F7A"/><Feather size={20} color="#E8A0BF" style={{transform:"scaleX(-1)"}}/>
          </div>
          <div style={{fontSize:"12px",letterSpacing:"0.25em",textTransform:"uppercase",color:"#FF1F7A",marginBottom:"10px",fontFamily:"Georgia,serif"}}>Today's Affirmation</div>
          <p style={{fontSize:"15px",color:"#777",fontFamily:"Georgia,serif",fontStyle:"italic",marginBottom:"14px",lineHeight:1.6}}>{c.affirmationInstruction}</p>
          <p style={{fontSize:"22px",color:"#1A1A2E",fontFamily:"'Playfair Display',Georgia,serif",fontStyle:"italic",lineHeight:1.65,margin:"0 0 16px"}}>{c.affirmation}</p>
          <div style={{width:"30px",height:"1px",background:"rgba(255,31,122,0.3)",margin:"0 auto 14px"}}/>
          <p style={{fontSize:"15px",color:"#555",fontFamily:"Georgia,serif",lineHeight:1.85,margin:"0 auto",maxWidth:"560px"}}>{c.affirmationClose}</p>
        </div>
      </div>
    </div>
  );
};

// ── ORACLE TAB ───────────────────────────────────────────────────
const OracleTab = () => {
  const [phase,setPhase]=useState("breath");
  const [three,setThree]=useState([]);
  const [picked,setPicked]=useState(null);
  const [revealed,setRevealed]=useState(false);
  const [why,setWhy]=useState("");

  const onBreath=()=>{const s=[...ORACLE_CARDS].sort(()=>Math.random()-0.5).slice(0,3);setThree(s);setPhase("selecting");};

  const pick=async(card)=>{
    setPicked(card);setWhy(card.whyYouPulled);setPhase("loading");
    await new Promise(r=>setTimeout(r,2000));
    setPhase("revealed");setTimeout(()=>setRevealed(true),100);
  };

  const reset=()=>{setPhase("breath");setPicked(null);setRevealed(false);setThree([]);setWhy("");};

  return (
    <div style={{paddingBottom:"32px"}}>
      <div style={{textAlign:"center",padding:"32px 24px 24px",borderBottom:"1px solid #f0e8d4"}}>
        <h2 style={{fontFamily:"'Playfair Display',Georgia,serif",fontSize:"32px",color:"#1A1A2E",margin:"0 0 6px",fontWeight:"400",fontStyle:"italic"}}>Your <span style={{color:"#FF1F7A"}}>Oracle</span></h2>
        <p style={{margin:0,fontSize:"15px",color:"#888",fontFamily:"Georgia,serif",fontStyle:"italic"}}>A message from your highest self</p>
      </div>
      {phase==="breath"&&<div style={{padding:"32px 32px 40px"}}><p style={{textAlign:"center",fontFamily:"'Playfair Display',Georgia,serif",fontSize:"24px",color:"#1A1A2E",fontStyle:"italic",marginBottom:"8px",lineHeight:1.6}}>Before you choose your card...</p><p style={{textAlign:"center",fontFamily:"Georgia,serif",fontSize:"18px",color:"#555",fontStyle:"italic",marginBottom:"0",lineHeight:1.7}}>Take three breaths. Hold your question in your heart.</p><BreathingCircle onComplete={onBreath}/></div>}
      {phase==="selecting"&&(
        <div style={{padding:"32px 32px"}}>
          <p style={{textAlign:"center",fontFamily:"'Playfair Display',Georgia,serif",fontSize:"24px",color:"#1A1A2E",fontStyle:"italic",marginBottom:"8px"}}>Which card is calling to you?</p>
          <p style={{textAlign:"center",fontFamily:"Georgia,serif",fontSize:"17px",color:"#777",fontStyle:"italic",marginBottom:"32px"}}>Don't think. Feel.</p>
          <div className="two-col-3" style={{display:"grid",gridTemplateColumns:"1fr 1fr 1fr",gap:"16px",marginBottom:"24px"}}>{three.map((card,i)=><FaceDownCard key={card.id} imgSrc={ORACLE_IMGS[i%3]} onClick={()=>pick(card)}/>)}</div>
          <div style={{textAlign:"center"}}><button onClick={reset} style={{background:"none",border:"1.5px solid #ddd",borderRadius:"10px",padding:"12px 28px",color:"#666",fontFamily:"Georgia,serif",fontSize:"15px"}}>Start Again</button></div>
        </div>
      )}
      {phase==="loading"&&(<div style={{padding:"60px 24px",textAlign:"center",display:"flex",flexDirection:"column",alignItems:"center",minHeight:"400px",justifyContent:"center"}}><div style={{marginBottom:"32px",animation:"slowPulse 3s infinite ease-in-out"}}><MetatronsCube size={160} color="#FF1F7A" opacity={0.6}/></div><LoadingMessages/></div>)}
      {phase==="revealed"&&picked&&(
        <div style={{opacity:revealed?1:0,transition:"opacity 0.6s ease",padding:"28px 24px"}}>
          <div style={{textAlign:"center",marginBottom:"28px"}}>
            <div style={{fontSize:"11px",letterSpacing:"0.22em",textTransform:"uppercase",color:"#FF1F7A",fontFamily:"Georgia,serif",marginBottom:"12px"}}>You Pulled</div>
            <h2 style={{fontFamily:"'Playfair Display',Georgia,serif",fontSize:"36px",color:"#1A1A2E",margin:"0 0 8px",fontWeight:"600"}}>{picked.title}</h2>
            <p style={{fontFamily:"'Playfair Display',Georgia,serif",fontSize:"17px",color:"#FF1F7A",fontStyle:"italic",margin:"0 0 8px"}}>{picked.symbol}</p>
          </div>
          <div style={{background:"linear-gradient(160deg,#fdfcf4,#f5ede0)",border:"1.5px solid rgba(100,120,200,0.2)",borderRadius:"20px",padding:"36px 28px",marginBottom:"24px",position:"relative",overflow:"hidden",boxShadow:"0 8px 48px rgba(255,31,122,0.07)"}}>
            {["tl","tr","bl","br"].map(pos=>(<div key={pos} style={{position:"absolute",top:pos.startsWith("t")?14:undefined,bottom:pos.startsWith("b")?14:undefined,left:pos.endsWith("l")?14:undefined,right:pos.endsWith("r")?14:undefined,opacity:0.2}}><svg width="16" height="16" viewBox="0 0 18 18" fill="none"><path d={pos==="tl"?"M1 9 L1 1 L9 1":pos==="tr"?"M17 9 L17 1 L9 1":pos==="bl"?"M1 9 L1 17 L9 17":"M17 9 L17 17 L9 17"} stroke="#FF1F7A" strokeWidth="1.2"/></svg></div>))}
            <div style={{textAlign:"center",marginBottom:"24px"}}>
              <div style={{display:"flex",alignItems:"center",gap:"10px",justifyContent:"center",marginBottom:"18px"}}><div style={{height:"1px",width:"36px",background:"rgba(255,31,122,0.25)"}}/><span style={{fontSize:"14px",letterSpacing:"0.18em",textTransform:"uppercase",color:"#FF1F7A",fontFamily:"Georgia,serif"}}>A Message From Her</span><div style={{height:"1px",width:"36px",background:"rgba(255,31,122,0.25)"}}/></div>
              <p style={{fontFamily:"'Playfair Display',Georgia,serif",fontSize:"20px",color:"#1A1A2E",lineHeight:1.8,margin:"0 0 16px",fontStyle:"italic",textAlign:"center"}}>{picked.message}</p>
              <p style={{fontFamily:"'Playfair Display',Georgia,serif",fontSize:"14px",color:"#FF1F7A",fontStyle:"italic",margin:0}}>— love, your highest self</p>
            </div>
            <div style={{height:"1px",background:"linear-gradient(to right,transparent,rgba(255,31,122,0.2),transparent)",margin:"24px 0"}}/>
            <div style={{marginBottom:"24px"}}>
              <div style={{textAlign:"center",fontSize:"14px",letterSpacing:"0.18em",textTransform:"uppercase",color:"#FF1F7A",fontFamily:"Georgia,serif",marginBottom:"18px"}}>The Deeper Reading</div>
              <div style={{fontSize:"17px",color:"#2a2a2a",lineHeight:2,fontFamily:"Georgia,serif",whiteSpace:"pre-line"}}>{picked.deeperReading}</div>
            </div>
            <div style={{height:"1px",background:"linear-gradient(to right,transparent,rgba(255,31,122,0.2),transparent)",margin:"24px 0"}}/>
            <div style={{background:"rgba(255,31,122,0.03)",border:"1px solid rgba(255,31,122,0.1)",borderRadius:"14px",padding:"24px 22px",marginBottom:"20px"}}>
              <div style={{display:"flex",justifyContent:"center",marginBottom:"10px"}}><svg width="22" height="22" viewBox="0 0 22 22" fill="none"><circle cx="11" cy="11" r="10" stroke="#FF1F7A" strokeWidth="1" opacity="0.5"/><path d="M7 11 L10 14 L15 8" stroke="#FF1F7A" strokeWidth="1.2" opacity="0.7"/></svg></div>
              <div style={{textAlign:"center",fontSize:"14px",letterSpacing:"0.18em",textTransform:"uppercase",color:"#FF1F7A",fontFamily:"Georgia,serif",marginBottom:"14px"}}>Why You Pulled This Card</div>
              <p style={{fontFamily:"'Playfair Display',Georgia,serif",fontSize:"17px",color:"#3a3a3a",fontStyle:"italic",lineHeight:1.85,margin:0,textAlign:"center"}}>{why||picked.whyYouPulled}</p>
            </div>
            <div style={{background:"linear-gradient(135deg,rgba(255,31,122,0.04),transparent)",border:"1px solid rgba(255,31,122,0.12)",borderRadius:"14px",padding:"22px 20px"}}>
              <div style={{textAlign:"center",fontSize:"14px",letterSpacing:"0.18em",textTransform:"uppercase",color:"#FF1F7A",fontFamily:"Georgia,serif",marginBottom:"12px"}}>Your Action Today</div>
              <p style={{fontFamily:"Georgia,serif",fontSize:"16px",color:"#2a2a2a",lineHeight:1.85,margin:0}}>{picked.action}</p>
            </div>
          </div>
          <button onClick={reset} style={{width:"100%",background:"linear-gradient(135deg,#FF1F7A,#FF6BAB)",border:"none",borderRadius:"12px",padding:"18px",color:"#fff",fontSize:"15px",fontFamily:"'Playfair Display',Georgia,serif",letterSpacing:"0.06em",boxShadow:"0 4px 16px rgba(255,31,122,0.22)"}}>Draw Again ✦</button>
          <p style={{textAlign:"center",fontFamily:"Georgia,serif",fontSize:"14px",color:"#bbb",fontStyle:"italic",marginTop:"20px",lineHeight:1.7}}>The card that lands is the one you needed. Trust it.</p>
        </div>
      )}
    </div>
  );
};

// ── SETUP MODAL ──────────────────────────────────────────────────
const SetupModal = ({onComplete,initial}) => {
  const [step,setStep]=useState(1);
  const [type,setType]=useState(initial?.type||null);
  const [centers,setCenters]=useState(initial?.centers||[]);
  const tog=c=>setCenters(p=>p.includes(c)?p.filter(x=>x!==c):[...p,c]);
  return (
    <div style={{position:"fixed",inset:0,background:"rgba(253,252,248,0.97)",zIndex:200,display:"flex",alignItems:"center",justifyContent:"center",padding:"20px",backdropFilter:"blur(8px)"}}>
      <div style={{maxWidth:"480px",width:"100%",maxHeight:"90vh",overflowY:"auto",background:"#fff",borderRadius:"24px",border:"1.5px solid rgba(255,31,122,0.2)",padding:"40px 32px",boxShadow:"0 8px 60px rgba(255,31,122,0.1)"}}>
        <div style={{textAlign:"center",marginBottom:"28px"}}>
          <Lotus size={48} color="#FF1F7A"/>
          <h2 style={{fontFamily:"'Playfair Display',Georgia,serif",fontSize:"28px",color:"#1A1A2E",margin:"14px 0 8px",fontWeight:"normal"}}>{initial?"Update Your Design":"Welcome, Queen"}</h2>
          <p style={{margin:0,fontSize:"16px",color:"#555",fontFamily:"Georgia,serif",fontStyle:"italic",lineHeight:1.6}}>{step===1?"Select your Human Design type so your weekly message speaks directly to you.":"Select your open (undefined) centers. Skip any you're unsure of."}</p>
        </div>
        {step===1?(
          <>
            <div style={{display:"flex",flexDirection:"column",gap:"10px",marginBottom:"24px"}}>
              {HD_TYPES.map(t=><button key={t} onClick={()=>setType(t)} style={{background:type===t?"linear-gradient(135deg,rgba(255,31,122,0.09),rgba(137,207,240,0.07))":"#f5f5f5",border:type===t?"2px solid #FF1F7A":"2px solid #ddd",borderRadius:"12px",padding:"16px 20px",color:type===t?"#1A1A2E":"#444",fontSize:"17px",fontFamily:"Georgia,serif",textAlign:"left",transition:"all 0.2s",fontWeight:type===t?"600":"normal"}}>{type===t?"✦  ":""}{t}</button>)}
            </div>
            <button onClick={()=>type&&setStep(2)} disabled={!type} style={{width:"100%",background:type?"linear-gradient(135deg,#FF1F7A,#FF6BAB)":"#ddd",border:"none",borderRadius:"12px",padding:"18px",color:type?"#fff":"#999",fontSize:"17px",fontFamily:"Georgia,serif",letterSpacing:"0.06em"}}>Continue →</button>
          </>
        ):(
          <>
            <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:"10px",marginBottom:"20px"}}>
              {CENTERS.map(c=><button key={c} onClick={()=>tog(c)} style={{background:centers.includes(c)?"rgba(137,207,240,0.1)":"#f5f5f5",border:centers.includes(c)?"2px solid #89CFF0":"2px solid #ddd",borderRadius:"10px",padding:"14px 10px",color:centers.includes(c)?"#1A1A2E":"#444",fontSize:"15px",fontFamily:"Georgia,serif",textAlign:"center",transition:"all 0.2s",fontWeight:centers.includes(c)?"600":"normal"}}>{centers.includes(c)?"✦ ":""}{c}</button>)}
            </div>
            <p style={{fontSize:"14px",color:"#777",fontFamily:"Georgia,serif",textAlign:"center",marginBottom:"20px",fontStyle:"italic"}}>Not sure? Skip — you can update anytime.</p>
            <div style={{display:"flex",gap:"10px"}}>
              <button onClick={()=>setStep(1)} style={{background:"#f5f5f5",border:"2px solid #ddd",borderRadius:"12px",padding:"16px 20px",color:"#555",fontFamily:"Georgia,serif",fontSize:"17px"}}>←</button>
              <button onClick={()=>type&&onComplete({type,centers})} style={{flex:1,background:"linear-gradient(135deg,#FF1F7A,#FF6BAB)",border:"none",borderRadius:"12px",padding:"18px",color:"#fff",fontSize:"17px",fontFamily:"Georgia,serif",letterSpacing:"0.06em"}}>Enter the Portal ✦</button>
            </div>
          </>
        )}
      </div>
    </div>
  );
};

// ── MAIN APP ─────────────────────────────────────────────────────
function App() {
  const [tab,setTab]=useState("transit");
  const [profile,setProfile]=useState(null);
  const [showSetup,setShowSetup]=useState(false);
  const [loaded,setLoaded]=useState(false);

  useEffect(()=>{
    try{const saved=localStorage.getItem(STORAGE_KEY);if(saved){const p=JSON.parse(saved);if(p?.type){setProfile(p);setShowSetup(false);}else setShowSetup(true);}else setShowSetup(true);}
    catch{setShowSetup(true);}
    setLoaded(true);
  },[]);

  const handleProfile=(p)=>{setProfile(p);try{localStorage.setItem(STORAGE_KEY,JSON.stringify(p));}catch{}setShowSetup(false);};

  if(!loaded) return null;

  return (
    <div style={{minHeight:"100vh",background:"#FDFCF8",color:"#1A1A2E",fontFamily:"Georgia,serif",position:"relative"}}>
      <Sparkles/>
      <div style={{position:"fixed",inset:0,pointerEvents:"none",zIndex:0,overflow:"hidden"}}>
        <img src={IMGS.bg3} style={{position:"absolute",top:"-5%",left:"-5%",width:"40%",opacity:0.35,mixBlendMode:"multiply"}}/>
        <img src={IMGS.bg3} style={{position:"absolute",bottom:"-5%",right:"-5%",width:"40%",opacity:0.25,mixBlendMode:"multiply",transform:"rotate(180deg)"}}/>
        <img src={IMGS.sparkle1} style={{position:"absolute",top:"8%",right:"2%",width:"22%",opacity:0.18}}/>
        <img src={IMGS.sparkle2} style={{position:"absolute",top:"35%",left:"1%",width:"12%",opacity:0.2}}/>
        <img src={IMGS.sparkle3} style={{position:"absolute",bottom:"20%",left:"3%",width:"18%",opacity:0.15}}/>
      </div>
      {showSetup&&<SetupModal onComplete={handleProfile} initial={profile}/>}
      <div style={{position:"relative",zIndex:1,maxWidth:"1100px",margin:"0 auto",paddingBottom:"60px"}}>

        {/* Header */}
        <div style={{textAlign:"center",padding:"36px 32px 22px",borderBottom:"1px solid #f0e8d4"}}>
          <div style={{fontSize:"12px",letterSpacing:"0.28em",textTransform:"uppercase",color:"#FF1F7A",marginBottom:"8px",fontFamily:"Georgia,serif"}}>Embody Wealth</div>
          <h1 style={{fontFamily:"'Playfair Display',Georgia,serif",fontSize:"34px",fontWeight:"600",margin:"0 0 4px",color:"#1A1A2E"}}>The Wealth Portal</h1>
          <p style={{margin:0,fontSize:"15px",color:"#666",fontStyle:"italic"}}>This Week's Magnetic Message</p>
          {profile?.type&&(
            <div style={{display:"flex",gap:"10px",justifyContent:"center",flexWrap:"wrap",marginTop:"14px"}}>
              {[profile.type,...(profile.centers?.length?[profile.centers.length+" Open "+(profile.centers.length===1?"Center":"Centers")]:[])].map(t=><span key={t} style={{background:"rgba(255,31,122,0.07)",border:"1.5px solid rgba(255,31,122,0.3)",borderRadius:"20px",padding:"6px 18px",fontSize:"15px",color:"#FF1F7A",fontFamily:"Georgia,serif",fontWeight:"600"}}>{t}</span>)}
            </div>
          )}
        </div>

        {/* Tabs */}
        <div style={{display:"flex",borderBottom:"1px solid #f0e8d4"}}>
          {[{id:"transit",label:"☀  Sun Transit"},{id:"oracle",label:"✦  Daily Oracle"}].map(t=>(
            <button key={t.id} onClick={()=>setTab(t.id)} style={{flex:1,background:"none",border:"none",borderBottom:tab===t.id?"3px solid #FF1F7A":"3px solid transparent",padding:"20px",color:tab===t.id?"#FF1F7A":"#555",fontSize:"16px",letterSpacing:"0.1em",textTransform:"uppercase",fontFamily:"'Playfair Display',Georgia,serif",fontWeight:tab===t.id?"600":"400",transition:"all 0.2s"}}>{t.label}</button>
          ))}
        </div>

        <div style={{animation:"fadeUp 0.35s ease",padding:"0 16px"}}>
          {tab==="transit"&&<TransitTab hdType={profile?.type} openCenters={profile?.centers||[]}/>}
          {tab==="oracle"&&<OracleTab/>}
        </div>

        {/* Footer */}
        <div style={{textAlign:"center",padding:"24px 32px",borderTop:"1px solid #f0e8d4"}}>
          <button onClick={()=>setShowSetup(true)} style={{background:"none",border:"none",color:"#666",fontSize:"14px",letterSpacing:"0.1em",textTransform:"uppercase",fontFamily:"Georgia,serif",fontWeight:"600",display:"block",margin:"0 auto 14px"}}>Update My Design</button>
          <Lotus size={24} color="#FF1F7A"/>
          <p style={{margin:"8px 0 0",fontSize:"13px",color:"#FF6BAB",letterSpacing:"0.1em",fontFamily:"Georgia,serif"}}>To living our dreams. — Aurailia ✦</p>
        </div>
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
